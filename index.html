
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        nav { background-color: #2c3e50; padding: 1rem; }
        .nav-botones { display: flex; gap: 1rem; }
        .nav-btn { padding: 0.5rem 1rem; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .nav-btn:hover { background-color: #2980b9; }
        #contenido-principal { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .producto { border: 1px solid #ddd; border-radius: 4px; padding: 1rem; margin: 1rem 0; max-width: 300px; }
        .btn-carrito { padding: 0.5rem 1rem; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 1rem; }
        .btn-carrito:hover { background-color: #27ae60; }
        .mensaje { padding: 1rem; border-radius: 4px; margin-top: 1rem; }
        .exito { background-color: #dff0d8; color: #3c763d; border: 1px solid #d6e9c6; }
    </style>
</head>
<body>
    <!-- Navegación -->
    <nav>
        <div class="nav-botones">
            <button class="nav-btn" id="btn-inicio">Inicio</button>
            <button class="nav-btn" id="btn-productos">Productos</button>
            <button class="nav-btn" id="btn-novedades">Novedades</button>
            <button class="nav-btn" id="btn-contactos">Contactos</button>
        </div>
    </nav>

    <!-- Espacio donde se carga el contenido -->
    <div id="contenido-principal"></div>

    <script>
        // Referencia al contenedor principal
        const contenidoPrincipal = document.getElementById('contenido-principal');

        // Función para mostrar contenido en el contenedor
        function mostrarContenido(html) {
            contenidoPrincipal.innerHTML = html;
            // Agregar evento a los botones de "Añadir al carrito" que se carguen dinámicamente
            const botonesCarrito = document.querySelectorAll('.btn-carrito');
            botonesCarrito.forEach(btn => {
                btn.addEventListener('click', () => {
                    const producto = btn.dataset.producto;
                    mostrarMensaje(`✅ Producto "${producto}" añadido al carrito exitosamente!`, 'exito');
                });
            });
        }

        // Función para mostrar mensajes de confirmación
        function mostrarMensaje(texto, clase) {
            const mensaje = document.createElement('div');
            mensaje.className = `mensaje ${clase}`;
            mensaje.textContent = texto;
            contenidoPrincipal.appendChild(mensaje);
            // Ocultar mensaje después de 3 segundos
            setTimeout(() => mensaje.remove(), 3000);
        }

        // Contenido de cada sección
        const contenido = {
            inicio: `
                <h2>Bienvenido a nuestra Tienda Online</h2>
                <p>Encuentra los mejores productos al mejor precio.</p>
                <div class="producto">
                    <h3>Producto Destacado</h3>
                    <p>Descripción breve del producto destacado.</p>
                    <p>Precio: $29.99</p>
                    <button class="btn-carrito" data-producto="Producto Destacado">Añadir al carrito</button>
                </div>
            `,
            productos: `
                <h2>Nuestros Productos</h2>
                <div class="producto">
                    <h3>Camiseta Premium</h3>
                    <p>100% algodón, disponible en varios colores.</p>
                    <p>Precio: $19.99</p>
                    <button class="btn-carrito" data-producto="Camiseta Premium">Añadir al carrito</button>
                </div>
                <div class="producto">
                    <h3>Zapatos Deportivos</h3>
                    <p>Amortiguación avanzada para mayor comodidad.</p>
                    <p>Precio: $49.99</p>
                    <button class="btn-carrito" data-producto="Zapatos Deportivos">Añadir al carrito</button>
                </div>
            `,
            novedades: `
                <h2>Últimas Novedades</h2>
                <div class="producto">
                    <h3>Tablet Lite</h3>
                    <p>Pantalla 10.1", 64GB de almacenamiento.</p>
                    <p>Precio: $149.99</p>
                    <button class="btn-carrito" data-producto="Tablet Lite">Añadir al carrito</button>
                </div>
            `,
            contactos: `
                <h2>Contáctanos</h2>
                <p>Email: contacto@tiendaonline.com</p>
                <p>Teléfono: 0987 654 321</p>
                <p>Dirección: Calle Principal #123, Ambato - Ecuador</p>
            `
        };

        // Eventos para los botones de navegación
        document.getElementById('btn-inicio').addEventListener('click', () => mostrarContenido(contenido.inicio));
        document.getElementById('btn-productos').addEventListener('click', () => mostrarContenido(contenido.productos));
        document.getElementById('btn-novedades').addEventListener('click', () => mostrarContenido(contenido.novedades));
        document.getElementById('btn-contactos').addEventListener('click', () => mostrarContenido(contenido.contactos));

        // Cargar el contenido de Inicio por defecto al abrir la página
        mostrarContenido(contenido.inicio);
    </script>
</body>
</html>
