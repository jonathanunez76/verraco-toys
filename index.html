<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERRACO TOYS - Tienda Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* ESTILO GENERAL */
        body {
            background-color: #f8f8f8;
            color: #333;
        }

        /* LOGO PRINCIPAL */
        .logo-container {
            text-align: center;
            padding: 20px 0;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            max-width: 250px;
            height: auto;
        }

        /* SECCIONES */
        .seccion {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .seccion-titulo {
            font-size: 22px;
            color: #d62828;
            margin-bottom: 20px;
            padding-bottom: 5px;
            border-bottom: 2px solid #d62828;
        }

        .texto {
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 16px;
        }

        /* PRODUCTOS EDITABLES */
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .producto-item {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            text-align: center;
        }

        .producto-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background-color: #f5f5f5;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .producto-nombre {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .producto-precio {
            font-weight: bold;
            color: #d62828;
            margin-bottom: 15px;
        }

        .btn-modificar {
            background-color: #d62828;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* PIE DE PÁGINA */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <!-- LOGO PRINCIPAL -->
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/TUUSUARIO/TUREPOSITORIO/main/imagenes/logo-verraco-toys.png" 
             alt="Logo VERRACO TOYS" class="logo">
    </div>


    <!-- SECCIÓN: QUIENES SOMOS -->
    <section class="seccion">
        <h2 class="seccion-titulo">¿QUIENES SOMOS?</h2>
        <p class="texto">
            En VERRACO TOYS creemos en el cariño y el respeto por TODAS las personas y mascotas. 
            Tenemos una tienda online para compartir nuestros productos, y tambien cuidamos de nuestra
            perrita adoptada (¡la mas tierna del barrio!).
        </p>
    </section>


    <!-- SECCIÓN DE PRODUCTOS EDITABLES -->
    <section class="seccion">
        <h2 class="seccion-titulo">PRODUCTOS DE VERRACO TOYS</h2>
        <div class="productos-grid">
            <!-- PRODUCTO 1 - EDITABLE -->
            <div class="producto-item">
