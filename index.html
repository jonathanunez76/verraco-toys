<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERRACO TOYS - Tienda Online</title>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .tienda {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 0 auto;
        }
        .logo-verraco {
            max-width: 200px;
            margin-bottom: 20px;
        }
        h1 {
            color: #d62828;
            text-transform: uppercase;
            margin-top: 10px;
        }
        .producto {
            margin: 20px 0;
        }
        img {
            max-width: 100%;
            border-radius: 5px;
        }
        .precio {
            font-size: 24px;
            font-weight: bold;
            color: #003049;
        }
        .stock {
            font-size: 20px;
            color: #2a9d8f;
            font-weight: bold;
        }
        .contacto {
            margin-top: 30px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="tienda">
        <img src="https://cdn.pixabay.com/photo/2018/05/27/14/22/eagle-3434845_1280.png" alt="Logo VERRACO TOYS con águila" class="logo-verraco">
        <h1>VERRACO TOYS</h1>
        <h2>Tu tienda de coches teledirigidos</h2>

        <div class="producto">
            <h3>Coche Teledirigido HOSHI N518</h3>
            <img src="https://cdn.pixabay.com/photo/2017/01/06/19/16/radio-controlled-toy-1958637_1280.jpg" alt="Coche Teledirigido HOSHI N518">
            <p class="precio">PRECIO: $650 USD</p>
            <p class="stock">✅ EN STOCK</p>
        </div>

        <div class="contacto">
            <p>📱 Contáctanos por WhatsApp: +593 9XXXXXXXXX</p>
            <p>📍 Ubicación: Ambato - Ecuador</p>
        </div>
    </div>
</body>
</html>
