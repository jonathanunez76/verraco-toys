<head>

    <!-- 📊 SEO Y ACCESIBILIDAD -->
    <meta name="description" content="VERRACO TOYS - Tienda de vehículos teledirigidos y productos coleccionables en Ambato, Ecuador. Calidad garantizada desde 2015.">
    <meta name="keywords" content="verraco toys, carros teledirigidos, helicópteros control remoto, productos coleccionables, juguetes Ambato, Tungurahua">
    <meta name="author" content="VERRACO TOYS">
    <link rel="shortcut icon" href="IMAGENES/favicon.png" type="image/x-icon"> <!-- CARPETA IMAGENES -->

    <style>
        /* 🎨 VARIABLES DE COLOR Y TAMAÑOS - FACILES DE MODIFICAR */
        :root {
            --color-principal: #ffd700; /* Dorado */
            --color-secundario: #28a745; /* Verde éxito */
            --color-error: #dc3545; /* Rojo agotado */
            --color-fondo: rgba(0, 0, 0, 0.1);
            --color-fondo-cajas: rgba(0, 0, 0, 0.2);
            --color-texto: white;
            --sombra: rgba(0, 0, 0, 0.3);
            --radio-bordes: 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: url('IMAGENES/fondo-principal.jpg') fixed center/cover no-repeat; /* CARPETA IMAGENES */
            color: var(--color-texto);
            padding-top: 80px;
            min-height: 100vh;
        }

        /* 🚀 BARRA DE NAVEGACIÓN */
        header {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            border-bottom: 2px solid var(--color-principal);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--sombra);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            max-width: 1200px;
            margin: 0 auto;
        }

        nav ul li a {
            color: var(--color-texto);
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            margin: 0 25px;
            text-shadow: 2px 2px 3px #000;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--color-principal);
        }

        /* 📦 CONTENEDOR PRINCIPAL */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 📑 SECCIONES GENERALES */
        .section {
            background: var(--color-fondo);
            backdrop-filter: blur(3px);
            border: 2px solid var(--color-principal);
            border-radius: var(--radio-bordes);
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 4px 15px var(--sombra);
        }

        .section h2 {
            color: var(--color-principal);
            text-align: center;
            font-size: 30px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--color-principal);
            text-shadow: 2px 2px 3px #000;
        }

        /* 📌 BOTONES DE CATEGORÍA */
        .category-button {
            background: rgba(255,215,0,0.7);
            color: black;
            border: none;
            padding: 12px;
            font-size: 19px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .category-button:hover {
            background: rgba(255,204,0,0.9);
        }

        /* 🛒 GRID DE PRODUCTOS */
        .products-grid {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            background: var(--color-fondo);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .product-box {
            background: var(--color-fondo-cajas);
            border: 1px solid var(--color-principal);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .product-box:hover {
            border-color: rgba(255,204,0,0.9);
            transform: translateY(-5px);
        }

        .product-img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
        }

        .product-box h4 {
            font-size: 18px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 3px #000;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .price {
            color: var(--color-secundario);
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px #000;
        }

        .stock { 
            color: var(--color-secundario); 
            margin-bottom: 15px; 
            text-shadow: 1px 1px 2px #000; 
        }
        .out-stock { 
            color: var(--color-error); 
            margin-bottom: 15px; 
            text-shadow: 1px 1px 2px #000; 
        }

        .buy-button {
            background: rgba(255,215,0,0.7);
            color: black;
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
        }

        .buy-button:disabled {
            background: rgba(108,117,125,0.7);
            cursor: not-allowed;
        }

        .buy-button:hover:not(:disabled) {
            background: rgba(255,204,0,0.9);
        }

        /* ℹ️ QUIENES SOMOS */
        #nosotros p {
            font-size: 17px;
            line-height: 1.8;
            text-align: justify;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px #000;
        }

        #nosotros strong { 
            color: var(--color-principal); 
            font-weight: 700;
        }

        /* 📞 CONTACTO */
        #contacto-info {
            text-align: center;
            font-size: 18px;
            line-height: 2;
            text-shadow: 1px 1px 2px #000;
        }

        #contacto-info strong { 
            color: var(--color-principal); 
            font-weight: 700;
        }
        #contacto-info a { 
            color: var(--color-texto); 
            text-decoration: none; 
            transition: color 0.3s ease;
        }
        #contacto-info a:hover { 
            color: var(--color-principal); 
            text-decoration: underline;
        }

        .whatsapp-button {
            display: block;
            background: rgba(40,167,69,0.7);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            transition: background 0.3s ease;
        }

        .whatsapp-button:hover { 
            background: rgba(33,136,56,0.9); 
        }

        /* 📝 PIE DE PÁGINA */
        footer {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            border-top: 2px solid var(--color-principal);
            text-align: center;
            padding: 20px 0;
            margin-top: 30px;
            box-shadow: 0 -2px 10px var(--sombra);
        }

        footer p { 
            text-shadow: 1px 1px 2px #000; 
            font-size: 16px;
        }
        footer p strong { 
            color: var(--color-principal); 
            font-weight: 700;
        }

        /* 📱 RESPONSIVO */
        @media (max-width: 768px) {
            nav ul { 
                flex-direction: column; 
                text-align: center; 
                padding: 15px 0; 
            }
            nav ul li { 
                margin: 8px 0; 
            }
            body { 
                padding-top: 160px; 
            }
            .products-grid { 
                grid-template-columns: 1fr; 
            }
            .section {
                padding: 25px;
                margin: 20px 0;
            }
            .product-img {
                height: 150px;
            }
        }
    </style>
</head>
