<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERRACO TOYS - Tienda Oficial</title>

    <!-- MEDIDAS DE SEGURIDAD PROFESIONALES -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' https://raw.githubusercontent.com https://cdn-icons-png.flaticon.com data:; connect-src 'self' https://wa.me; font-src 'self'; object-src 'none'; frame-src 'none'; media-src 'self';">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=(), accelerometer=(), gyroscope=(), magnetometer=(), ambient-light-sensor=()">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-site">
    <meta http-equiv="Cross-Origin-Resource-Policy" content="same-site">

    <!-- SEO Y ACCESIBILIDAD -->
    <meta name="description" content="VERRACO TOYS - Tu tienda profesional de vehículos a control remoto y coleccionables en Ambato.">
    <meta name="keywords" content="verraco toys, carros teledirigidos, helicópteros control remoto, aviones teledirigidos, coleccionables Ambato">
    <meta name="author" content="VERRACO TOYS">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/1087/1087833.png" type="image/x-icon">

    <script>
        // FUNCIÓN PARA ABRIR/CERRAR CATEGORÍAS - 100% FUNCIONAL
        function toggleCategory(categoryId) {
            const content = document.getElementById(categoryId);
            content.style.display = content.style.display === 'grid' ? 'none' : 'grid';
        }

        // FUNCIÓN PARA WHATSAPP - CONFIGURADA Y SEGURA
        function openWhatsApp(productName, productPrice) {
            const phoneNumber = '593999999999'; // CAMBIA POR TU NÚMERO REAL
            const message = `¡Hola VERRACO TOYS!%0A%0AMi nombre es: [NOMBRE DEL CLIENTE]%0AMi correo electrónico es: [CORREO DEL CLIENTE]%0AQuiero comprar el producto: ${productName}%0APrecio del producto: $${productPrice} USD%0A%0AEspero su pronta respuesta.`;
            // Asegura que el enlace sea seguro
            const safeUrl = encodeURI(`https://wa.me/${phoneNumber}?text=${message}`);
            window.open(safeUrl, '_blank');
        }

        // PROTECCIÓN ADICIONAL AL CARGAR LA PÁGINA
        document.addEventListener('DOMContentLoaded', function() {
            // Evita la ejecución de scripts no autorizados
            document.body.addEventListener('click', function(e) {
                if (e.target.tagName === 'A' && !e.target.href.startsWith('https:')) {
                    e.preventDefault();
                }
            });
        });
    </script>

    <style>
        /* === ESTILOS GENERALES === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #000;
            background-image: url('https://raw.githubusercontent.com/jonathanunez76/verraco-toys/main/imagenes/22129c91-6342-490c-b668-9237e5a370dd%20(1).jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            line-height: 1.6;
            padding-top: 80px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* === BARRA DE NAVEGACIÓN === */
        .navbar {
            background-color: rgba(0,0,0,0.95);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            border-bottom: 3px solid #ffd700;
            z-index: 1000;
        }

        .navbar .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80px;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            margin: 0 25px;
            transition: color 0.3s;
            padding: 5px;
        }

        .navbar a:hover,
        .navbar a:focus {
            color: #ffd700;
            outline: none;
        }

        /* === SECCIONES === */
        .section {
            background-color: rgba(0,0,0,0.85);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
        }

        .section h2 {
            color: #ffd700;
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ffd700;
        }

        /* === CATEGORÍAS Y PRODUCTOS === */
        .category-btn {
            background-color: #ffd700;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: bold;
            width: 100%;
            margin-bottom: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            outline: none;
        }

        .category-btn:hover {
            background-color: #ffcc00;
        }

        .category-content {
            display: none;
            background-color: rgba(255,215,0,0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .category-content h3 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 25px;
            text-align: center;
            grid-column: 1 / -1;
        }

        .product-card {
            background-color: rgba(0,0,0,0.9);
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
        }

        .product-card h4 {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .product-card .price {
            font-size: 22px;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 10px;
        }

        .product-card .stock {
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 20px;
        }

        .product-card .out-of-stock {
            font-size: 18px;
            font-weight: bold;
            color: #dc3545;
            margin-bottom: 20px;
        }

        .buy-btn {
            background-color: #ffd700;
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: background-color 0.3s;
        }

        .buy-btn:disabled {
            background-color: #6c757d;
            color: #333;
            cursor: not-allowed;
        }

        .buy-btn:hover:not(:disabled) {
            background-color: #ffcc00;
        }

        /* === QUIENES SOMOS === */
        #quienes-somos p {
            font-size: 18px;
            text-align: justify;
            margin-bottom: 20px;
        }

        #quienes-somos .highlight {
            color: #ffd700;
            font-weight: bold;
        }

        /* === CONTACTO === */
        #contacto .contact-info {
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
        }

        #contacto .contact-info strong {
            color: #ffd700;
        }

        #contacto .contact-info a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
        }

        #contacto .contact-info a:hover {
            color: #ffd700;
        }

        #contacto .whatsapp-link {
            display: block;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            transition: background-color 0.3s;
        }

        #contacto .whatsapp-link:hover {
            background-color: #218838;
        }

        /* === PIE DE PÁGINA === */
        footer {
            background-color: rgba(0,0,0,0.95);
            border-top: 2px solid #ffd700;
            padding: 20px 0;
            text-align: center;
            margin-top: 50px;
        }

        footer p {
            font-size: 16px;
            color: #fff;
        }

        footer p strong {
            color: #ffd700;
        }

        /* === CELULARES === */
        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                height: auto;
                padding: 20px 0;
            }

            .navbar a {
                margin: 10px 0;
                font-size: 16px;
                width: 100%;
                text-align: center;
            }

            body {
                padding-top: 180px;
            }

            .section h2 {
                font-size: 26px;
            }

            .category-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar">
        <div class="container">

            <a href="#contacto">CONTACTO</a>
        </div>
    </nav>
